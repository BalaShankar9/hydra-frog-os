apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: hydra-frog
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: hydra-frog-os/dashboard:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: hydra-frog-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: hydra-frog
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
  type: ClusterIP
